<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abingdon School - Circuit Quiz</title>
    <style>
        /* Abingdon Brand Colors: Cerise Pink (#E64097) and Black (#000000) */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; line-height: 1.6; color: #000; background-color: #fafafa; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #000; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .header span { color: #E64097; font-weight: bold; }
        
        .circuit-container { border: 2px solid #eaeaea; padding: 20px; text-align: center; margin-bottom: 20px; background-color: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        canvas { background-color: white; border-radius: 4px; max-width: 100%; height: auto; }
        
        /* Interactive Quiz Section */
        .quiz-section { background-color: #fdf4f8; padding: 20px; border-radius: 8px; border: 1px solid #f2c7db; margin-bottom: 20px; }
        
        /* Responsive Header Area for Score and Title */
        .quiz-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f2c7db; padding-bottom: 15px; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .quiz-header h3 { margin: 0; }
        
        /* Scoreboard styling */
        .score-container { text-align: right; }
        .scoreboard { background-color: #fff; padding: 6px 15px; border: 2px solid #E64097; border-radius: 6px; font-weight: bold; font-size: 16px; color: #E64097; box-shadow: 0 2px 4px rgba(230, 64, 151, 0.1); display: inline-block; }
        
        .input-area { text-align: center; }
        .input-group { margin: 15px 0; font-size: 18px; font-weight: bold; display: inline-block; margin-right: 20px; }
        input[type="number"] { font-size: 18px; padding: 5px; width: 80px; text-align: center; margin: 0 10px; border: 1px solid #ccc; border-radius: 4px; outline-color: #E64097; }
        .feedback { font-size: 18px; margin-top: 15px; min-height: 27px; text-align: center;}
        
        /* Buttons */
        .controls { text-align: center; margin-top: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; color: white; border: none; border-radius: 4px; font-weight: bold; transition: background-color 0.2s, transform 0.1s;}
        button:active { transform: scale(0.98); }
        
        .btn-check { background-color: #E64097; }
        .btn-check:hover { background-color: #cc2b81; }
